<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Safety Check Test Ltd | Employee Portal</title>
  <style>
    *{box-sizing:border-box} body{margin:0;font-family:Arial,sans-serif;background:#f8fafc;color:#0f172a}
    .hero{background:#020617;color:#fff;padding:48px 20px}
    .wrap{max-width:1100px;margin:0 auto}
    .hero h1{margin:0 0 12px;font-size:2.1rem}
    .hero p{margin:0;color:#cbd5e1;max-width:760px}
    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:20px;padding:28px 20px;max-width:1100px;margin:0 auto}
    .card{background:#fff;border:1px solid #e2e8f0;border-radius:18px;padding:22px;box-shadow:0 10px 24px rgba(15,23,42,.06)}
    .field{display:flex;flex-direction:column;gap:8px;margin-bottom:14px}
    .field label{font-weight:700}
    input,textarea,select{width:100%;border:1px solid #cbd5e1;border-radius:12px;padding:12px 14px;font:inherit}
    .btn{display:inline-block;border:0;border-radius:12px;padding:13px 18px;font-weight:800;cursor:pointer}
    .btn-primary{background:linear-gradient(135deg,#f59e0b,#fbbf24);color:#111827}
    .btn-dark{background:#0f172a;color:#fff}
    .msg{margin-bottom:14px;padding:13px 15px;border-radius:12px;font-weight:700}
    .ok{background:#ecfdf5;color:#065f46;border:1px solid #a7f3d0}
    .err{background:#fef2f2;color:#991b1b;border:1px solid #fecaca}
    .jobs{display:grid;gap:14px;margin-top:16px}
    .job{border:1px solid #e2e8f0;border-radius:14px;padding:16px;background:#fff}
    .muted{color:#64748b}
    .hidden{display:none}
    .topbar{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:16px;flex-wrap:wrap}
  </style>
</head>
<body>
  <section class="hero">
    <div class="wrap">
      <h1>Employee Portal</h1>
      <p>Employee login and assigned jobs dashboard.</p>
    </div>
  </section>

  <div class="grid">
    <div class="card" id="loginCard">
      <h2>Employee Login</h2>
      <div id="loginMsg"></div>
      <form id="loginForm">
        <div class="field">
          <label>Email</label>
          <input id="email" type="email" required>
        </div>
        <div class="field">
          <label>Password</label>
          <input id="password" type="password" required>
        </div>
        <button class="btn btn-primary" type="submit">Log In</button>
      </form>
    </div>

    <div class="card hidden" id="dashCard">
      <div class="topbar">
        <div>
          <h2 style="margin:0 0 6px">My Jobs</h2>
          <div class="muted" id="employeeMeta"></div>
        </div>
        <button class="btn btn-dark" id="logoutBtn" type="button">Log Out</button>
      </div>
      <div id="jobsMsg"></div>
      <div id="jobsWrap" class="jobs"></div>
    </div>
  </div>

  <script>
    const API = "https://api.safetychecktestltd.co.uk";
    const tokenKey = "sct_employee_token";
    const loginCard = document.getElementById("loginCard");
    const dashCard = document.getElementById("dashCard");
    const loginMsg = document.getElementById("loginMsg");
    const jobsMsg = document.getElementById("jobsMsg");
    const jobsWrap = document.getElementById("jobsWrap");
    const employeeMeta = document.getElementById("employeeMeta");

    function msg(el, text, ok) {
      el.innerHTML = text ? '<div class="msg ' + (ok ? 'ok' : 'err') + '">' + text + '</div>' : '';
    }
    function showDash(show) {
      loginCard.classList.toggle("hidden", show);
      dashCard.classList.toggle("hidden", !show);
    }
    async function loadMeAndJobs() {
      const token = localStorage.getItem(tokenKey);
      if (!token) return showDash(false);
      try {
        const meRes = await fetch(API + "/api/employee/me", { headers: { Authorization: "Bearer " + token } });
        const meData = await meRes.json();
        if (!meRes.ok || !meData.ok) throw new Error(meData.message || "Employee session invalid");
        const jobsRes = await fetch(API + "/api/employee/jobs", { headers: { Authorization: "Bearer " + token } });
        const jobsData = await jobsRes.json();
        if (!jobsRes.ok || !jobsData.ok) throw new Error(jobsData.message || "Failed to load employee jobs");
        employeeMeta.textContent = (meData.employee.fullName || "") + " • " + (meData.employee.email || "");
        jobsWrap.innerHTML = "";
        const jobs = Array.isArray(jobsData.jobs) ? jobsData.jobs : [];
        if (!jobs.length) {
          jobsWrap.innerHTML = '<div class="job"><strong>No assigned jobs yet.</strong></div>';
        } else {
          jobs.forEach(job => {
            const div = document.createElement("div");
            div.className = "job";
            div.innerHTML =
              '<div><strong>' + (job.title || job.jobType || "Job") + '</strong></div>' +
              '<div class="muted" style="margin-top:6px">Status: ' + (job.status || "-") + '</div>' +
              '<div style="margin-top:6px">Company: ' + (job.companyName || "-") + '</div>' +
              '<div style="margin-top:6px">Description: ' + (job.description || "-") + '</div>';
            jobsWrap.appendChild(div);
          });
        }
        msg(jobsMsg, "Employee dashboard loaded.", true);
        showDash(true);
      } catch (err) {
        localStorage.removeItem(tokenKey);
        showDash(false);
        msg(loginMsg, err.message || "Login required", false);
      }
    }
    document.getElementById("loginForm").addEventListener("submit", async function (e) {
      e.preventDefault();
      msg(loginMsg, "", false);
      try {
        const res = await fetch(API + "/api/employee/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            email: document.getElementById("email").value.trim(),
            password: document.getElementById("password").value
          })
        });
        const data = await res.json();
        if (!res.ok || !data.ok) throw new Error(data.message || "Employee login failed");
        localStorage.setItem(tokenKey, data.token);
        await loadMeAndJobs();
      } catch (err) {
        msg(loginMsg, err.message || "Employee login failed", false);
      }
    });
    document.getElementById("logoutBtn").addEventListener("click", function () {
      localStorage.removeItem(tokenKey);
      showDash(false);
      msg(loginMsg, "Logged out.", true);
    });
    loadMeAndJobs();
  </script>
</body>
</html>
