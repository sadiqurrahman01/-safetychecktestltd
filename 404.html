<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Redirecting...</title>
    <script>
      (function () {
        var path = location.pathname + location.search + location.hash;
        sessionStorage.setItem("gh_redirect_path", path);
        location.replace("/");
      })();
    </script>
  </head>
  <body></body>
</html>
