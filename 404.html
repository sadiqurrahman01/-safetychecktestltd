<!doctype html>
<html>
  <head>
<script>
(function () {
  var path = window.location.pathname || "";
  if (path === "/admin" || path === "/admin/") {
    window.location.replace("/#/admin?tab=overview&t=" + Date.now());
    return;
  }
})();
</script>
    <meta charset="utf-8" />
    <title>Redirecting...</title>
    <script>
      (function () {
        var path = location.pathname + location.search + location.hash;
        var pathname = String(location.pathname || "");
        var hash = String(location.hash || "");
        var isAdminEntry =
          pathname === "/admin" ||
          pathname === "/admin/" ||
          hash === "#/admin" ||
          hash.indexOf("#/admin?") === 0 ||
          path === "/admin" ||
          path.indexOf("/admin?") === 0;

        try {
          sessionStorage.setItem(
            "gh_redirect_path",
            isAdminEntry ? "/#/login?t=" + Date.now() : path
          );
        } catch (e) {}

        location.replace("/");
      })();
    </script>
  </head>
  <body></body>
</html>
