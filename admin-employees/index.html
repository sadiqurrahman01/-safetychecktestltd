<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Employees Panel</title>
  <style>
    :root{
      --bg:#f3f6fb;
      --card:#ffffff;
      --text:#0f172a;
      --muted:#64748b;
      --line:#dbe3ee;
      --blue:#0f62fe;
      --green:#0f9f6e;
      --red:#dc2626;
      --shadow:0 12px 30px rgba(15,23,42,.08);
      --radius:18px;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:Arial,sans-serif;
      background:var(--bg);
      color:var(--text);
    }
    .wrap{
      max-width:1400px;
      margin:0 auto;
      padding:24px;
    }
    .topbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:16px;
      flex-wrap:wrap;
      margin-bottom:20px;
    }
    .title h1{
      margin:0;
      font-size:30px;
    }
    .title p{
      margin:6px 0 0;
      color:var(--muted);
    }
    .actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }
    button,a.btn{
      border:0;
      border-radius:12px;
      padding:12px 16px;
      font-weight:700;
      cursor:pointer;
      text-decoration:none;
      display:inline-flex;
      align-items:center;
      justify-content:center;
    }
    .btn-blue{background:var(--blue);color:#fff}
    .btn-dark{background:#111827;color:#fff}
    .btn-green{background:var(--green);color:#fff}
    .btn-red{background:var(--red);color:#fff}
    .grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:20px;
    }
    .card{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:18px;
    }
    .card h2{
      margin:0 0 14px;
      font-size:22px;
    }
    .muted{color:var(--muted)}
    .msg{
      margin:10px 0 0;
      font-weight:700;
    }
    .ok{color:var(--green)}
    .err{color:var(--red)}
    .list{
      display:grid;
      gap:14px;
      margin-top:12px;
    }
    .item{
      border:1px solid var(--line);
      border-radius:14px;
      padding:14px;
      background:#fff;
    }
    .row{
      display:grid;
      grid-template-columns:repeat(2,minmax(0,1fr));
      gap:12px;
    }
    .row3{
      display:grid;
      grid-template-columns:repeat(3,minmax(0,1fr));
      gap:12px;
    }
    label{
      display:block;
      font-size:13px;
      font-weight:700;
      margin-bottom:6px;
    }
    input,textarea,select{
      width:100%;
      border:1px solid var(--line);
      border-radius:12px;
      padding:12px;
      font:inherit;
      background:#fff;
    }
    textarea{min-height:90px;resize:vertical}
    .pill{
      display:inline-block;
      padding:6px 10px;
      border-radius:999px;
      background:#eef4ff;
      color:#1d4ed8;
      font-size:12px;
      font-weight:700;
      margin-right:8px;
      margin-bottom:8px;
    }
    .small{
      font-size:13px;
      color:var(--muted);
    }
    .spacer{height:8px}
    @media (max-width: 980px){
      .grid{grid-template-columns:1fr}
      .row,.row3{grid-template-columns:1fr}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <div class="title">
        <h1>Admin Employees Panel</h1>
        <p>Create employees, view employees, view jobs, and assign jobs.</p>
      </div>
      <div class="actions">
        <a class="btn btn-dark" href="https://www.safetychecktestltd.co.uk/admin/?t=" target="_blank" rel="noopener">Open Admin</a>
        <a class="btn btn-dark" href="https://www.safetychecktestltd.co.uk/admin-completion/?t=" target="_blank" rel="noopener">Completion Panel</a>
        <button class="btn-blue" id="refreshAll">Refresh</button>
        <button class="btn-red" id="clearToken">Clear admin token</button>
      </div>
    </div>

    <div class="grid">
      <section class="card">
        <h2>Create Employee</h2>
        <div class="row">
          <div>
            <label>Full name</label>
            <input id="fullName" placeholder="Employee full name" />
          </div>
          <div>
            <label>Email</label>
            <input id="email" placeholder="employee@email.com" />
          </div>
        </div>
        <div class="row3">
          <div>
            <label>Password</label>
            <input id="password" placeholder="Temporary password" />
          </div>
          <div>
            <label>Phone</label>
            <input id="phone" placeholder="Phone number" />
          </div>
          <div>
            <label>Trades (comma separated)</label>
            <input id="trades" placeholder="pat, electrical" />
          </div>
        </div>
        <div class="row3">
          <div>
            <label>Staff ID</label>
            <input id="staffId" placeholder="SCT-EMP-002" />
          </div>
          <div>
            <label>Profession</label>
            <input id="profession" placeholder="PAT Testing Engineer" />
          </div>
          <div>
            <label>Department</label>
            <input id="department" placeholder="Compliance" />
          </div>
        </div>
        <div class="row">
          <div>
            <label>Profile photo URL</label>
            <input id="profileImageUrl" placeholder="https://..." />
          </div>
          <div>
            <label>Emergency contact phone</label>
            <input id="emergencyContactPhone" placeholder="Emergency phone" />
          </div>
        </div>
        <div class="row">
          <div>
            <label>Emergency contact name</label>
            <input id="emergencyContactName" placeholder="Emergency contact name" />
          </div>
          <div>
            <label>Notes</label>
            <input id="notes" placeholder="Employee notes" />
          </div>
        </div>
        <div class="spacer"></div>
        <button class="btn-green" id="createEmployeeBtn">Create Employee</button>
        <div class="msg" id="createMsg"></div>
      </section>

      <section class="card">
        <h2>Assign Job</h2>
        <div class="row">
          <div>
            <label>Select job</label>
            <select id="jobSelect"></select>
          </div>
          <div>
            <label>Select employee</label>
            <select id="employeeSelect"></select>
          </div>
        </div>
        <div class="spacer"></div>
        <button class="btn-blue" id="assignBtn">Assign Selected Job</button>
        <div class="msg" id="assignMsg"></div>
        <div class="spacer"></div>
        <p class="small">This uses the live admin API to assign the chosen job to the chosen employee.</p>
      </section>
    </div>

    <div class="spacer"></div>

    <div class="grid">
      <section class="card">
        <h2>Employees</h2>
        <div id="employeesCount" class="small">Loading employees...</div>
        <div class="list" id="employeesList"></div>
      </section>

      <section class="card">
        <h2>Jobs</h2>
        <div id="jobsCount" class="small">Loading jobs...</div>
        <div class="list" id="jobsList"></div>
      </section>
    </div>
  </div>

  <script>
    const API = 'https://api.safetychecktestltd.co.uk';
    const TOKEN_KEY = 'sct_admin_token';

    function getToken() {
      return localStorage.getItem(TOKEN_KEY) || '';
    }

    function setMsg(el, text, type) {
      el.textContent = text || '';
      el.className = 'msg ' + (type || '');
    }

    async function api(path, opts = {}) {
      const token = getToken();
      const headers = Object.assign({}, opts.headers || {}, {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + token
      });

      const res = await fetch(API + path, Object.assign({}, opts, { headers }));
      const data = await res.json().catch(() => ({ ok: false, message: 'Invalid server response' }));
      if (!res.ok || !data.ok) {
        throw new Error(data.message || 'Request failed');
      }
      return data;
    }

    function text(v) {
      return String(v || '').trim();
    }

    function badge(v) {
      return '<span class="pill">' + v + '</span>';
    }

    function employeeCard(emp) {
      return `
        <div class="item">
          <div><strong>${text(emp.fullName) || '-'}</strong></div>
          <div class="small">${text(emp.email) || '-'}</div>
          <div class="spacer"></div>
          <div>${badge((emp.trades || []).join(', ') || 'No trades')}</div>
          <div class="small">Phone: ${text(emp.phone) || '-'}</div>
          <div class="small">Staff ID: ${text(emp.staffId) || '-'}</div>
          <div class="small">Profession: ${text(emp.profession) || '-'}</div>
          <div class="small">Department: ${text(emp.department) || '-'}</div>
          <div class="small">Active: ${emp.isActive ? 'Yes' : 'No'}</div>
          <div class="small">Notes: ${text(emp.notes) || '-'}</div>
        </div>
      `;
    }

    function jobCard(job) {
      return `
        <div class="item">
          <div><strong>${text(job.title) || 'Untitled job'}</strong></div>
          <div class="small">Job ID: ${text(job.jobId) || '-'}</div>
          <div class="small">Status: ${text(job.status) || '-'}</div>
          <div class="small">Employee status: ${text(job.employeeStatus) || '-'}</div>
          <div class="small">Employee: ${text(job.assignedEmployeeName) || '-'} ${job.assignedEmployeeEmail ? '• ' + job.assignedEmployeeEmail : ''}</div>
          <div class="small">Service: ${text(job.serviceType) || '-'}</div>
          <div class="small">Postcode: ${text(job.postcode) || '-'}</div>
          <div class="small">Updated: ${job.updatedAt ? new Date(job.updatedAt).toLocaleString() : '-'}</div>
          <div class="small">Description: ${text(job.description) || '-'}</div>
        </div>
      `;
    }

    async function loadEmployees() {
      const data = await api('/api/admin/employees');
      const list = Array.isArray(data.employees) ? data.employees : [];
      document.getElementById('employeesCount').textContent = 'Loaded ' + list.length + ' employee(s).';
      document.getElementById('employeesList').innerHTML = list.map(employeeCard).join('') || '<div class="item">No employees found.</div>';

      const select = document.getElementById('employeeSelect');
      select.innerHTML = list.map(emp => (
        '<option value="' + emp._id + '">' +
        (text(emp.fullName) || 'Unnamed') + ' - ' + (text(emp.email) || '-') +
        '</option>'
      )).join('');
    }

    async function loadJobs() {
      const data = await api('/api/admin/portal-jobs');
      const list = Array.isArray(data.jobs) ? data.jobs : [];
      document.getElementById('jobsCount').textContent = 'Loaded ' + list.length + ' job(s).';
      document.getElementById('jobsList').innerHTML = list.map(jobCard).join('') || '<div class="item">No jobs found.</div>';

      const select = document.getElementById('jobSelect');
      select.innerHTML = list.map(job => (
        '<option value="' + job._id + '">' +
        (text(job.jobId) || 'No Job ID') + ' - ' + (text(job.title) || 'Untitled') +
        '</option>'
      )).join('');
    }

    async function createEmployee() {
      const msg = document.getElementById('createMsg');
      setMsg(msg, '', '');

      try {
        const body = {
          fullName: text(document.getElementById('fullName').value),
          email: text(document.getElementById('email').value),
          password: text(document.getElementById('password').value),
          phone: text(document.getElementById('phone').value),
          trades: text(document.getElementById('trades').value).split(',').map(v => v.trim()).filter(Boolean),
          notes: text(document.getElementById('notes').value),
          profileImageUrl: text(document.getElementById('profileImageUrl').value),
          staffId: text(document.getElementById('staffId').value),
          profession: text(document.getElementById('profession').value),
          department: text(document.getElementById('department').value),
          emergencyContactName: text(document.getElementById('emergencyContactName').value),
          emergencyContactPhone: text(document.getElementById('emergencyContactPhone').value)
        };

        await api('/api/admin/employees', {
          method: 'POST',
          body: JSON.stringify(body)
        });

        setMsg(msg, 'Employee created successfully.', 'ok');
        await loadEmployees();
      } catch (err) {
        setMsg(msg, err.message || 'Failed to create employee', 'err');
      }
    }

    async function assignJob() {
      const msg = document.getElementById('assignMsg');
      setMsg(msg, '', '');

      try {
        const jobId = document.getElementById('jobSelect').value;
        const employeeId = document.getElementById('employeeSelect').value;

        await api('/api/admin/portal-jobs/' + encodeURIComponent(jobId) + '/assign-employee', {
          method: 'PATCH',
          body: JSON.stringify({ employeeId })
        });

        setMsg(msg, 'Job assigned successfully.', 'ok');
        await loadJobs();
      } catch (err) {
        setMsg(msg, err.message || 'Failed to assign job', 'err');
      }
    }

    async function boot() {
      const token = getToken();
      if (!token) {
        alert('No admin token found. Log into the main admin page first.');
        window.location.href = 'https://www.safetychecktestltd.co.uk/#/admin?t=' + Date.now();
        return;
      }

      await loadEmployees();
      await loadJobs();
    }

    document.getElementById('createEmployeeBtn').addEventListener('click', createEmployee);
    document.getElementById('assignBtn').addEventListener('click', assignJob);
    document.getElementById('refreshAll').addEventListener('click', boot);
    document.getElementById('clearToken').addEventListener('click', () => {
      localStorage.removeItem(TOKEN_KEY);
      alert('Admin token cleared.');
      window.location.href = 'https://www.safetychecktestltd.co.uk/admin/?t=' + Date.now();
    });

    boot().catch(err => {
      alert(err.message || 'Failed to load admin employees panel');
    });
  </script>

<script>
(function () {
  function getAdminToken() {
    try {
      return localStorage.getItem("sct_admin_token") || localStorage.getItem("adminToken") || "";
    } catch (e) {
      return "";
    }
  }

  function parseJwt(token) {
    try {
      var part = token.split(".")[1];
      if (!part) return null;
      part = part.replace(/-/g, "+").replace(/_/g, "/");
      while (part.length % 4) part += "=";
      return JSON.parse(atob(part));
    } catch (e) {
      return null;
    }
  }

  function redirectToAdmin() {
    window.location.href = "https://www.safetychecktestltd.co.uk/#/admin?t=" + Date.now();
  }

  var token = getAdminToken();
  if (!token) {
    alert("Please log in to the Master Admin Control Center first.");
    redirectToAdmin();
    return;
  }

  var payload = parseJwt(token);
  var role = payload && (payload.role || payload.type || "");
  if (role && role !== "admin" && role !== "master_admin") {
    alert("Access denied.");
    redirectToAdmin();
    return;
  }

  window.__SCT_ADMIN_TOKEN__ = token;

  var origFetch = window.fetch;
  window.fetch = function(input, init) {
    init = init || {};
    init.headers = init.headers || {};
    if (init.headers instanceof Headers) {
      if (!init.headers.has("Authorization")) {
        init.headers.set("Authorization", "Bearer " + window.__SCT_ADMIN_TOKEN__);
      }
    } else if (!init.headers.Authorization && !init.headers.authorization) {
      init.headers.Authorization = "Bearer " + window.__SCT_ADMIN_TOKEN__;
    }
    return origFetch(input, init).then(function(res) {
      if (res.status === 401 || res.status === 403) {
        redirectToAdmin();
      }
      return res;
    });
  };
})();
</script>


<script id="sct-panel-audit-employees">
(function () {
  function getAdminToken() {
    return (
      localStorage.getItem("sct_admin_token") ||
      localStorage.getItem("adminToken") ||
      ""
    );
  }

  async function logPanelOpen() {
    var token = getAdminToken();
    if (!token) return;

    try {
      await fetch("https://api.safetychecktestltd.co.uk/api/admin/audits/panel-open", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Authorization": "Bearer " + token
        },
        body: JSON.stringify({ panel: "employees" })
      });
    } catch (err) {
      console.warn("panel audit log failed", err);
    }
  }

  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", logPanelOpen, { once: true });
  } else {
    logPanelOpen();
  }
})();
</script>

</body>
</html>
