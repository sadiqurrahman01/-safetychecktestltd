<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password | Safety Check Test Ltd</title>
  <link rel="icon" type="image/png" href="/favicon.png" />
  <style>
    body{font-family:Arial,sans-serif;background:#f8fafc;margin:0;color:#0f172a}
    .wrap{max-width:520px;margin:60px auto;padding:24px}
    .card{background:#fff;border:1px solid #e2e8f0;border-radius:16px;padding:28px;box-shadow:0 10px 30px rgba(0,0,0,.06)}
    .logo{display:block;max-width:220px;max-height:90px;margin:0 auto 18px}
    h1{font-size:28px;margin:0 0 10px;text-align:center}
    p{color:#475569;line-height:1.5}
    label{display:block;margin:14px 0 6px;font-weight:600}
    input{width:100%;box-sizing:border-box;padding:12px 14px;border:1px solid #cbd5e1;border-radius:10px;font-size:16px}
    button{width:100%;margin-top:18px;padding:13px 16px;border:0;border-radius:10px;background:#0f172a;color:#fff;font-size:16px;font-weight:700;cursor:pointer}
    .msg{margin-top:14px;padding:12px 14px;border-radius:10px;display:none}
    .ok{background:#ecfdf5;color:#166534;border:1px solid #bbf7d0}
    .err{background:#fef2f2;color:#991b1b;border:1px solid #fecaca}
    .small{font-size:14px;text-align:center;margin-top:10px}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <img class="logo" src="/logo.png" alt="Safety Check Test Ltd logo">
      <h1>Reset password</h1>
      <p>Enter your new password below.</p>

      <label for="password">New password</label>
      <input id="password" type="password" placeholder="Enter new password">

      <label for="confirmPassword">Confirm password</label>
      <input id="confirmPassword" type="password" placeholder="Confirm new password">

      <button id="submitBtn">Update password</button>

      <div id="okMsg" class="msg ok"></div>
      <div id="errMsg" class="msg err"></div>

      <div class="small">
        <a href="/admin">Back to admin</a>
      </div>
    </div>
  </div>

  <script>
    const API_BASE = "https://api.safetychecktestltd.co.uk";
    const token = new URLSearchParams(window.location.search).get("token");
    const btn = document.getElementById("submitBtn");
    const okMsg = document.getElementById("okMsg");
    const errMsg = document.getElementById("errMsg");

    function showOk(msg){
      okMsg.style.display = "block";
      errMsg.style.display = "none";
      okMsg.textContent = msg;
    }

    function showErr(msg){
      errMsg.style.display = "block";
      okMsg.style.display = "none";
      errMsg.textContent = msg;
    }

    btn.addEventListener("click", async () => {
      const password = document.getElementById("password").value.trim();
      const confirmPassword = document.getElementById("confirmPassword").value.trim();

      if (!token) return showErr("Missing reset token.");
      if (!password) return showErr("Please enter a new password.");
      if (password.length < 8) return showErr("Password must be at least 8 characters.");
      if (password !== confirmPassword) return showErr("Passwords do not match.");

      btn.disabled = true;
      btn.textContent = "Updating...";

      try {
        const res = await fetch(API_BASE + "/api/admin/reset-password", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ token, password })
        });

        const data = await res.json().catch(() => ({}));

        if (!res.ok) {
          throw new Error(data.message || "Failed to reset password");
        }

        showOk("Password updated successfully. You can now log in.");
        setTimeout(() => { window.location.href = "/admin"; }, 1800);
      } catch (err) {
        showErr(err.message || "Failed to reset password");
      } finally {
        btn.disabled = false;
        btn.textContent = "Update password";
      }
    });
  </script>
</body>
</html>
