<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password | Safety Check Test Ltd</title>
  <link rel="icon" type="image/png" href="/favicon.png" />
  <style>
    body{
      margin:0;
      font-family:Arial,Helvetica,sans-serif;
      background:#eef2f7;
      color:#0f172a;
    }
    .wrap{
      max-width:560px;
      margin:40px auto;
      background:#fff;
      border:1px solid #dbe3ef;
      border-radius:24px;
      padding:36px 28px;
      box-shadow:0 10px 30px rgba(15,23,42,.08);
    }
    .logo{
      text-align:center;
      margin-bottom:18px;
    }
    .logo img{
      max-width:180px;
      width:100%;
      height:auto;
    }
    h1{
      text-align:center;
      margin:0 0 10px;
      font-size:28px;
      color:#0b1b49;
    }
    p.sub{
      text-align:center;
      margin:0 0 28px;
      color:#475569;
      font-size:16px;
    }
    label{
      display:block;
      margin:16px 0 8px;
      font-weight:700;
      font-size:15px;
      color:#0f172a;
    }
    input{
      width:100%;
      box-sizing:border-box;
      padding:16px 18px;
      border:2px solid #d5deea;
      border-radius:16px;
      font-size:16px;
      outline:none;
    }
    input:focus{
      border-color:#0b1b49;
    }
    button{
      width:100%;
      margin-top:22px;
      padding:16px 18px;
      border:none;
      border-radius:16px;
      background:#07153f;
      color:#fff;
      font-size:18px;
      font-weight:700;
      cursor:pointer;
    }
    button:disabled{
      opacity:.6;
      cursor:not-allowed;
    }
    .msg{
      margin-top:18px;
      padding:16px 18px;
      border-radius:16px;
      font-size:15px;
      line-height:1.4;
      display:none;
      white-space:pre-wrap;
    }
    .msg.error{
      display:block;
      background:#fff1f2;
      border:1px solid #fecdd3;
      color:#b91c1c;
    }
    .msg.success{
      display:block;
      background:#ecfdf5;
      border:1px solid #bbf7d0;
      color:#166534;
    }
    .helper{
      margin-top:10px;
      font-size:13px;
      color:#64748b;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="logo">
      <img src="/logo.png" alt="Safety Check Test Ltd logo">
    </div>

    <h1>Reset password</h1>
    <p class="sub">Enter your email and new password below.</p>

    <form id="resetForm">
      <label for="email">Email</label>
      <input id="email" name="email" type="email" autocomplete="email" required>

      <label for="password">New password</label>
      <input id="password" name="password" type="password" minlength="8" required>

      <label for="confirmPassword">Confirm password</label>
      <input id="confirmPassword" name="confirmPassword" type="password" minlength="8" required>

      <div class="helper">Password must be at least 8 characters.</div>

      <button id="submitBtn" type="submit">Update password</button>
    </form>

    <div id="message" class="msg"></div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const token =
      params.get("token") ||
      params.get("resetToken") ||
      "";

    const emailFromUrl =
      params.get("email") ||
      "";

    const form = document.getElementById("resetForm");
    const emailInput = document.getElementById("email");
    const passwordInput = document.getElementById("password");
    const confirmPasswordInput = document.getElementById("confirmPassword");
    const submitBtn = document.getElementById("submitBtn");
    const messageBox = document.getElementById("message");

    if (emailFromUrl) {
      emailInput.value = emailFromUrl;
    }

    function showMessage(type, text) {
      messageBox.className = "msg " + type;
      messageBox.textContent = text;
    }

    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      const email = emailInput.value.trim().toLowerCase();
      const newPassword = passwordInput.value;
      const confirmPassword = confirmPasswordInput.value;

      if (!email || !token || !newPassword) {
        showMessage("error", "Email, reset token and new password are required");
        return;
      }

      if (newPassword.length < 8) {
        showMessage("error", "Password must be at least 8 characters");
        return;
      }

      if (newPassword !== confirmPassword) {
        showMessage("error", "Passwords do not match");
        return;
      }

      submitBtn.disabled = true;
      showMessage("success", "Updating password...");

      try {
        const res = await fetch("https://api.safetychecktestltd.co.uk/api/admin/reset-password", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            email,
            resetToken: token,
            newPassword
          })
        });

        const data = await res.json().catch(() => ({}));

        if (!res.ok || !data.ok) {
          throw new Error(data.message || "Failed to reset password");
        }

        showMessage("success", "Password updated successfully. You can now return to the admin login page.");
        form.reset();
        if (emailFromUrl) {
          emailInput.value = emailFromUrl;
        }
      } catch (err) {
        showMessage("error", err.message || "Failed to reset password");
      } finally {
        submitBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
