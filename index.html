<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>safety-check-test-ltd</title>
    <script>
      (function () {
        var redirectPath = sessionStorage.getItem("gh_redirect_path");
        if (redirectPath) {
          sessionStorage.removeItem("gh_redirect_path");
          if (redirectPath !== location.pathname + location.search + location.hash) {
            history.replaceState(null, "", redirectPath);
          }
        }
      })();
    </script>
    <script type="module" crossorigin src="/assets/index-D30Sxg19.js"></script>
    <link rel="stylesheet" crossorigin href="/assets/index-nqMpL4T3.css">
  </head>
  <body>
    <div id="root"></div>

    <script>
      (function () {
        function hasAdminSession() {
          return !!(
            localStorage.getItem("sct_admin_token") ||
            localStorage.getItem("adminToken")
          );
        }

        function inAdminArea() {
          return (window.location.hash || "").indexOf("#/admin") === 0;
        }

        function findOverviewTab() {
          return Array.from(document.querySelectorAll("button, a")).find(function (el) {
            return (el.textContent || "").trim() === "Overview";
          });
        }

        function findHeaderBar() {
          var logout = Array.from(document.querySelectorAll("button")).find(function (el) {
            return (el.textContent || "").trim() === "Log Out";
          });
          if (logout && logout.parentElement) return logout.parentElement;
          return null;
        }

        function makeLink(label, href, bg) {
          var a = document.createElement("a");
          a.href = href;
          a.textContent = label;
          a.style.display = "inline-flex";
          a.style.alignItems = "center";
          a.style.justifyContent = "center";
          a.style.padding = "10px 14px";
          a.style.borderRadius = "10px";
          a.style.fontWeight = "700";
          a.style.textDecoration = "none";
          a.style.color = "#fff";
          a.style.background = bg;
          a.style.boxSizing = "border-box";
          return a;
        }

        function removeShortcuts() {
          var old = document.getElementById("sct-master-admin-shortcuts");
          if (old) old.remove();
        }

        function injectShortcuts() {
          if (!inAdminArea() || !hasAdminSession()) {
            removeShortcuts();
            return;
          }

          if (document.getElementById("sct-master-admin-shortcuts")) return;

          var headerBar = findHeaderBar();
          var overviewTab = findOverviewTab();

          if (!headerBar || !overviewTab) return;

          var wrap = document.createElement("div");
          wrap.id = "sct-master-admin-shortcuts";
          wrap.style.display = "flex";
          wrap.style.flexWrap = "wrap";
          wrap.style.gap = "10px";
          wrap.style.margin = "14px 0 18px 0";

          wrap.appendChild(
            makeLink(
              "Open Completion Panel",
              "https://www.safetychecktestltd.co.uk/admin-completion/?t=" + Date.now(),
              "#2563eb"
            )
          );

          wrap.appendChild(
            makeLink(
              "Open Employees Panel",
              "https://www.safetychecktestltd.co.uk/admin-employees/?t=" + Date.now(),
              "#059669"
            )
          );

          var target = overviewTab.closest("div");
          if (target && target.parentElement) {
            target.parentElement.insertBefore(wrap, target.nextSibling);
            return;
          }

          if (headerBar.parentElement) {
            headerBar.parentElement.insertBefore(wrap, headerBar.nextSibling);
          }
        }

        function boot() {
          injectShortcuts();
          setTimeout(injectShortcuts, 400);
          setTimeout(injectShortcuts, 1000);
          setTimeout(injectShortcuts, 1800);
        }

        window.addEventListener("load", boot);
        window.addEventListener("hashchange", function () {
          removeShortcuts();
          boot();
        });

        if (document.readyState === "loading") {
          document.addEventListener("DOMContentLoaded", boot);
        } else {
          boot();
        }
      })();
    </script>
  </body>
</html>
