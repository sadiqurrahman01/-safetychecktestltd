  <body>
    <div id="root"></div>
  
<script>
(function () {
  function addShortcuts() {
    if ((window.location.hash || "").indexOf("#/admin") !== 0) return;

    var token =
      localStorage.getItem("sct_admin_token") ||
      localStorage.getItem("adminToken") ||
      "";

    if (!token) return;

    if (document.getElementById("sct-master-admin-shortcuts")) return;

    var buttons = Array.from(document.querySelectorAll("button"));
    var refreshBtn = buttons.find(function (b) {
      return (b.textContent || "").trim() === "Refresh";
    });
    var logoutBtn = buttons.find(function (b) {
      return (b.textContent || "").trim() === "Log Out";
    });

    var anchor = logoutBtn || refreshBtn;
    if (!anchor || !anchor.parentElement) return;

    var wrap = document.createElement("div");
    wrap.id = "sct-master-admin-shortcuts";
    wrap.style.display = "flex";
    wrap.style.flexWrap = "wrap";
    wrap.style.gap = "10px";
    wrap.style.marginTop = "12px";
    wrap.style.width = "100%";

    function makeLink(label, href, bg) {
      var a = document.createElement("a");
      a.href = href;
      a.textContent = label;
      a.style.display = "inline-flex";
      a.style.alignItems = "center";
      a.style.justifyContent = "center";
      a.style.padding = "10px 14px";
      a.style.borderRadius = "10px";
      a.style.fontWeight = "700";
      a.style.textDecoration = "none";
      a.style.color = "#fff";
      a.style.background = bg;
      return a;
    }

    wrap.appendChild(
      makeLink(
        "Open Completion Panel",
        "https://www.safetychecktestltd.co.uk/admin-completion/?t=" + Date.now(),
        "#2563eb"
      )
    );

    wrap.appendChild(
      makeLink(
        "Open Employees Panel",
        "https://www.safetychecktestltd.co.uk/admin-employees/?t=" + Date.now(),
        "#059669"
      )
    );

    anchor.parentElement.appendChild(wrap);
  }

  function boot() {
    addShortcuts();
    setTimeout(addShortcuts, 500);
    setTimeout(addShortcuts, 1200);
    setTimeout(addShortcuts, 2200);
  }

  window.addEventListener("load", boot);
  window.addEventListener("hashchange", boot);

  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", boot);
  } else {
    boot();
  }
})();
</script>

  </body>
