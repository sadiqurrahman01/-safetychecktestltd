<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>safety-check-test-ltd</title>
    






<script>
(function () {
  function makeLink(text, href, bg) {
    const a = document.createElement("a");
    a.textContent = text;
    a.href = href;
    a.target = "_blank";
    a.rel = "noopener noreferrer";
    a.style.display = "inline-flex";
    a.style.alignItems = "center";
    a.style.justifyContent = "center";
    a.style.padding = "10px 14px";
    a.style.borderRadius = "10px";
    a.style.textDecoration = "none";
    a.style.fontWeight = "700";
    a.style.fontSize = "14px";
    a.style.background = bg;
    a.style.color = "#fff";
    a.style.boxShadow = "0 2px 8px rgba(0,0,0,0.12)";
    return a;
  }

  function getAdminSession() {
    try {
      const token = localStorage.getItem("sct_admin_token") || "";
      const rawUser =
        localStorage.getItem("sct_admin_user") ||
        localStorage.getItem("adminUser") ||
        localStorage.getItem("sct_user") ||
        "";
      let user = null;
      try { user = rawUser ? JSON.parse(rawUser) : null; } catch (_) {}
      return { token, user };
    } catch (_) {
      return { token: "", user: null };
    }
  }

  function allowedRole(user) {
    const role = String(user && user.role || "").trim().toLowerCase();
    return role === "master_admin" || role === "admin";
  }

  function findAdminMount() {
    const candidates = Array.from(document.querySelectorAll("h1,h2,h3,div,section"));
    for (const el of candidates) {
      const txt = (el.textContent || "").trim();
      if (
        txt.includes("Master Admin Control Center") ||
        txt.includes("Safety Check Test Admin") ||
        txt.includes("master_admin") ||
        txt.includes("Overview")
      ) {
        return el.closest("div,section,main") || el.parentElement || el;
      }
    }
    return document.body;
  }

  function render() {
    const existing = document.getElementById("sct-master-admin-shortcuts");
    if (existing) existing.remove();

    const session = getAdminSession();
    if (!session.token || !allowedRole(session.user)) return;

    if (!location.href.includes("#/admin")) return;

    const host = findAdminMount();
    if (!host) return;

    const wrap = document.createElement("div");
    wrap.id = "sct-master-admin-shortcuts";
    wrap.style.display = "flex";
    wrap.style.flexWrap = "wrap";
    wrap.style.gap = "10px";
    wrap.style.margin = "16px 0";
    wrap.style.padding = "14px";
    wrap.style.border = "1px solid #e5e7eb";
    wrap.style.borderRadius = "14px";
    wrap.style.background = "#f8fafc";

    const title = document.createElement("div");
    title.textContent = "Admin Shortcuts";
    title.style.width = "100%";
    title.style.fontWeight = "800";
    title.style.fontSize = "15px";
    title.style.color = "#0f172a";
    title.style.marginBottom = "2px";
    wrap.appendChild(title);

    wrap.appendChild(
      makeLink(
        "Open Completion Panel",
        "https://www.safetychecktestltd.co.uk/admin-completion/?t=" + Date.now(),
        "#0f62fe"
      )
    );

    wrap.appendChild(
      makeLink(
        "Open Employees Panel",
        "https://www.safetychecktestltd.co.uk/admin-employees/?t=" + Date.now(),
        "#0f9f6e"
      )
    );

    if (host.firstChild) host.insertBefore(wrap, host.firstChild);
    else host.appendChild(wrap);
  }

  function boot() {
    render();
    let tries = 0;
    const timer = setInterval(() => {
      render();
      tries += 1;
      if (tries > 20) clearInterval(timer);
    }, 800);
    window.addEventListener("hashchange", render);
  }

  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", boot);
  } else {
    boot();
  }
})();
</script>

</body>
</html>
