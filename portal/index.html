<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Safety Check Test Ltd | Client Portal</title>
  <style>
    * { box-sizing: border-box; }
    body { margin:0; font-family:Arial,sans-serif; background:#f8fafc; color:#0f172a; }
    .wrap { max-width:1100px; margin:0 auto; padding:32px 20px; }
    .hero { background:#020617; color:#fff; padding:48px 20px; }
    .hero h1 { margin:0 0 12px; font-size:2.2rem; }
    .hero p { margin:0; color:#cbd5e1; max-width:760px; }
    .grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(320px,1fr)); gap:20px; margin-top:28px; }
    .card { background:#fff; border:1px solid #e2e8f0; border-radius:18px; padding:22px; box-shadow:0 10px 24px rgba(15,23,42,0.06); }
    h2,h3 { margin-top:0; }
    .field { display:flex; flex-direction:column; gap:8px; margin-bottom:14px; }
    .field label { font-weight:700; font-size:.95rem; }
    input,select,textarea { width:100%; border:1px solid #cbd5e1; border-radius:12px; padding:12px 14px; font:inherit; }
    textarea { min-height:110px; resize:vertical; }
    .btn { display:inline-block; border:0; border-radius:12px; padding:13px 18px; font-weight:800; cursor:pointer; text-decoration:none; }
    .btn-primary { background:linear-gradient(135deg,#f59e0b,#fbbf24); color:#111827; }
    .btn-muted { background:#e2e8f0; color:#0f172a; }
    .msg { margin-bottom:14px; padding:13px 15px; border-radius:12px; font-weight:700; }
    .ok { background:#ecfdf5; color:#065f46; border:1px solid #a7f3d0; }
    .err { background:#fef2f2; color:#991b1b; border:1px solid #fecaca; }
    .note { background:#eff6ff; color:#1d4ed8; border:1px solid #bfdbfe; }
    .hidden { display:none; }
    .jobs { display:grid; gap:14px; }
    .job { background:#fff; border:1px solid #e2e8f0; border-radius:14px; padding:16px; }
    .job-top { display:flex; justify-content:space-between; gap:12px; flex-wrap:wrap; margin-bottom:8px; }
    .pill { display:inline-block; padding:6px 10px; border-radius:999px; background:#fff7ed; color:#c2410c; font-size:.8rem; font-weight:800; }
    .muted { color:#64748b; }
  </style>
</head>
<body>
  <div class="hero">
    <div class="wrap">
      <h1>Client Portal</h1>
      <p>Portal for councils, businesses and partners. Existing organisations can log in. New organisations can request access.</p>
    </div>
  </div>

  <div class="wrap" id="guestArea">
    <div class="grid">
      <div class="card">
        <h2>Portal Login</h2>
        <div id="loginMsg"></div>
        <form id="loginForm">
          <div class="field">
            <label>Email</label>
            <input name="email" type="email" required>
          </div>
          <div class="field">
            <label>Password</label>
            <input name="password" type="password" required>
          </div>
          <button class="btn btn-primary" type="submit">Log In</button>
        </form>
      </div>

      <div class="card" id="request-access">
        <h2>Request Organisation Account</h2>
        <div id="requestMsg"></div>
        <form id="requestForm">
          <div class="field">
            <label>Organisation name</label>
            <input name="organisationName" required>
          </div>
          <div class="field">
            <label>Contact name</label>
            <input name="contactName" required>
          </div>
          <div class="field">
            <label>Email</label>
            <input name="email" type="email" required>
          </div>
          <div class="field">
            <label>Phone</label>
            <input name="phone">
          </div>
          <div class="field">
            <label>Service type</label>
            <input name="serviceType">
          </div>
          <div class="field">
            <label>Site address</label>
            <input name="siteAddress">
          </div>
          <div class="field">
            <label>Postcode</label>
            <input name="postcode">
          </div>
          <div class="field">
            <label>Description</label>
            <textarea name="description" required></textarea>
          </div>
          <button class="btn btn-primary" type="submit">Submit Request</button>
        </form>
      </div>
    </div>
  </div>

  <div class="wrap hidden" id="portalArea">
    <div class="card">
      <h2>Organisation Dashboard</h2>
      <div id="portalMsg"></div>
      <p><strong>Organisation:</strong> <span id="orgName">-</span></p>
      <p><strong>Type:</strong> <span id="orgType">-</span></p>
      <p><strong>User:</strong> <span id="userName">-</span></p>
      <button class="btn btn-muted" id="logoutBtn" type="button">Log Out</button>
    </div>

    <div class="grid" style="margin-top:20px;">
      <div class="card">
        <h3>Submit New Job</h3>
        <div id="jobMsg"></div>
        <form id="jobForm">
          <div class="field">
            <label>Contact name</label>
            <input name="contactName">
          </div>
          <div class="field">
            <label>Email</label>
            <input name="email" type="email">
          </div>
          <div class="field">
            <label>Phone</label>
            <input name="phone">
          </div>
          <div class="field">
            <label>Service type</label>
            <input name="serviceType" required>
          </div>
          <div class="field">
            <label>Site address</label>
            <input name="siteAddress">
          </div>
          <div class="field">
            <label>Postcode</label>
            <input name="postcode">
          </div>
          <div class="field">
            <label>Priority</label>
            <select name="priority">
              <option value="Normal">Normal</option>
              <option value="Urgent">Urgent</option>
              <option value="High">High</option>
            </select>
          </div>
          <div class="field">
            <label>Description</label>
            <textarea name="description" required></textarea>
          </div>
          <button class="btn btn-primary" type="submit">Submit Job</button>
        </form>
      </div>

      <div class="card">
        <h3>Your Jobs</h3>
        <div id="jobsMsg"></div>
        <button class="btn btn-muted" id="refreshJobsBtn" type="button" style="margin-bottom:14px;">Refresh Jobs</button>
        <div id="jobsList" class="jobs"></div>
      </div>
    </div>
  </div>

  <script>
    const API = "https://api.safetychecktestltd.co.uk/api/portal";
    const TOKEN_KEY = "sct_portal_token";
    const USER_KEY = "sct_portal_user";

    const guestArea = document.getElementById("guestArea");
    const portalArea = document.getElementById("portalArea");

    function box(el, kind, text) {
      el.innerHTML = text ? '<div class="msg ' + kind + '">' + text + '</div>' : '';
    }

    function token() { return localStorage.getItem(TOKEN_KEY) || ""; }
    function setAuth(t, u) {
      localStorage.setItem(TOKEN_KEY, t);
      localStorage.setItem(USER_KEY, JSON.stringify(u || null));
    }
    function clearAuth() {
      localStorage.removeItem(TOKEN_KEY);
      localStorage.removeItem(USER_KEY);
    }

    function showGuest() {
      guestArea.classList.remove("hidden");
      portalArea.classList.add("hidden");
    }

    function showPortal(user) {
      guestArea.classList.add("hidden");
      portalArea.classList.remove("hidden");
      document.getElementById("orgName").textContent = user?.organisation?.name || "-";
      document.getElementById("orgType").textContent = user?.organisation?.type || "-";
      document.getElementById("userName").textContent = user?.fullName || "-";
    }

    async function api(path, opts) {
      const options = opts || {};
      const headers = options.headers || {};
      if (token()) headers.Authorization = "Bearer " + token();

      const res = await fetch(API + path, {
        method: options.method || "GET",
        headers,
        body: options.body || null
      });

      const data = await res.json().catch(() => ({}));
      if (!res.ok) throw new Error(data.message || "Request failed");
      return data;
    }

    function renderJobs(jobs) {
      const el = document.getElementById("jobsList");
      if (!jobs || !jobs.length) {
        el.innerHTML = '<div class="msg note">No jobs found yet.</div>';
        return;
      }
      el.innerHTML = jobs.map(job => `
        <div class="job">
          <div class="job-top">
            <strong>${job.reference || "No reference"}</strong>
            <span class="pill">${(job.status || "submitted").replaceAll("_"," ")}</span>
          </div>
          <div class="muted"><strong>Service:</strong> ${job.serviceType || "-"}<br><strong>Site:</strong> ${job.siteAddress || "-"} ${job.postcode || ""}</div>
          <div style="margin-top:8px; white-space:pre-wrap;">${job.description || ""}</div>
        </div>
      `).join("");
    }

    async function loadPortal() {
      try {
        const me = await api("/me");
        showPortal(me.user);
        box(document.getElementById("portalMsg"), "ok", "Portal connected successfully.");

        const jobs = await api("/jobs");
        renderJobs(jobs.jobs || []);
      } catch (err) {
        clearAuth();
        showGuest();
        box(document.getElementById("loginMsg"), "err", "Session expired or portal login failed.");
      }
    }

    document.getElementById("loginForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      box(document.getElementById("loginMsg"), "note", "Logging in...");
      try {
        const fd = new FormData(e.target);
        const res = await fetch(API + "/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            email: String(fd.get("email") || "").trim(),
            password: String(fd.get("password") || "")
          })
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok || !data.ok || !data.token) throw new Error(data.message || "Login failed");
        setAuth(data.token, data.user || null);
        box(document.getElementById("loginMsg"), "ok", "Login successful.");
        await loadPortal();
      } catch (err) {
        box(document.getElementById("loginMsg"), "err", err.message || "Login failed");
      }
    });

    document.getElementById("requestForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      box(document.getElementById("requestMsg"), "note", "Submitting request...");
      try {
        const fd = new FormData(e.target);
        const res = await fetch(API + "/request-access", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            organisationName: String(fd.get("organisationName") || "").trim(),
            contactName: String(fd.get("contactName") || "").trim(),
            email: String(fd.get("email") || "").trim(),
            phone: String(fd.get("phone") || "").trim(),
            serviceType: String(fd.get("serviceType") || "").trim(),
            siteAddress: String(fd.get("siteAddress") || "").trim(),
            postcode: String(fd.get("postcode") || "").trim(),
            description: String(fd.get("description") || "").trim(),
            priority: "Normal"
          })
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok || !data.ok) throw new Error(data.message || "Failed to submit request");
        box(document.getElementById("requestMsg"), "ok", "Request submitted successfully. Reference: " + (data.reference || "created"));
        e.target.reset();
      } catch (err) {
        box(document.getElementById("requestMsg"), "err", err.message || "Failed to submit request");
      }
    });

    document.getElementById("jobForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      box(document.getElementById("jobMsg"), "note", "Submitting job...");
      try {
        const fd = new FormData(e.target);
        const data = await api("/jobs", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            contactName: String(fd.get("contactName") || "").trim(),
            email: String(fd.get("email") || "").trim(),
            phone: String(fd.get("phone") || "").trim(),
            serviceType: String(fd.get("serviceType") || "").trim(),
            siteAddress: String(fd.get("siteAddress") || "").trim(),
            postcode: String(fd.get("postcode") || "").trim(),
            priority: String(fd.get("priority") || "Normal").trim(),
            description: String(fd.get("description") || "").trim()
          })
        });
        box(document.getElementById("jobMsg"), "ok", "Job submitted successfully. Reference: " + (data.job?.reference || "created"));
        e.target.reset();
        await loadPortal();
      } catch (err) {
        box(document.getElementById("jobMsg"), "err", err.message || "Failed to submit job");
      }
    });

    document.getElementById("refreshJobsBtn").addEventListener("click", loadPortal);
    document.getElementById("logoutBtn").addEventListener("click", () => {
      clearAuth();
      showGuest();
    });

    if (token()) {
      loadPortal();
    } else {
      showGuest();
    }
  </script>
</body>
</html>
