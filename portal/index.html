<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Safety Check Test Ltd | Portal</title>
  <style>
    *{box-sizing:border-box} body{margin:0;font-family:Arial,sans-serif;background:#f8fafc;color:#0f172a}
    .hero{background:#020617;color:#fff;padding:48px 20px}
    .wrap{max-width:1100px;margin:0 auto}
    .hero h1{margin:0 0 12px;font-size:2.2rem}
    .hero p{margin:0;color:#cbd5e1;max-width:760px}
    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:20px;padding:28px 20px}
    .card{background:#fff;border:1px solid #e2e8f0;border-radius:18px;padding:22px;box-shadow:0 10px 24px rgba(15,23,42,.06)}
    .field{display:flex;flex-direction:column;gap:8px;margin-bottom:14px}
    .field label{font-weight:700}
    input,textarea,select{width:100%;border:1px solid #cbd5e1;border-radius:12px;padding:12px 14px;font:inherit}
    textarea{min-height:110px;resize:vertical}
    .btn{display:inline-block;border:0;border-radius:12px;padding:13px 18px;font-weight:800;cursor:pointer}
    .btn-primary{background:linear-gradient(135deg,#f59e0b,#fbbf24);color:#111827}
    .msg{margin-bottom:14px;padding:13px 15px;border-radius:12px;font-weight:700}
    .ok{background:#ecfdf5;color:#065f46;border:1px solid #a7f3d0}
    .err{background:#fef2f2;color:#991b1b;border:1px solid #fecaca}
  </style>
</head>
<body>
  <section class="hero">
    <div class="wrap">
      <h1>Client Portal</h1>
      <p>Portal login for councils, businesses and partners. New organisations can request access below.</p>
    </div>
  </section>

  <div class="grid">
    <div class="card">
      <h2>Portal Login</h2>
      <div id="loginMsg"></div>
      <form id="loginForm">
        <div class="field">
          <label>Email</label>
          <input name="email" type="email" required>
        </div>
        <div class="field">
          <label>Password</label>
          <input name="password" type="password" required>
        </div>
        <button class="btn btn-primary" type="submit">Log In</button>
      </form>
    </div>

    <div class="card" id="request-access">
      <h2>Request Organisation Account</h2>
      <div id="requestMsg"></div>
      <form id="requestForm">
        <div class="field">
          <label>Organisation name</label>
          <input name="organisationName" required>
        </div>
        <div class="field">
          <label>Contact name</label>
          <input name="contactName" required>
        </div>
        <div class="field">
          <label>Email</label>
          <input name="email" type="email" required>
        </div>
        <div class="field">
          <label>Phone</label>
          <input name="phone">
        </div>
        <div class="field">
          <label>Service type</label>
          <input name="serviceType">
        </div>
        <div class="field">
          <label>Site address</label>
          <input name="siteAddress">
        </div>
        <div class="field">
          <label>Postcode</label>
          <input name="postcode">
        </div>
        <div class="field">
          <label>Description</label>
          <textarea name="description" required></textarea>
        </div>
        <button class="btn btn-primary" type="submit">Submit Request</button>
      </form>
    </div>
  </div>

  <script>
    const API = "https://api.safetychecktestltd.co.uk/api/portal";

    function showMsg(id, kind, text) {
      document.getElementById(id).innerHTML = text ? '<div class="msg ' + kind + '">' + text + '</div>' : '';
    }

    document.getElementById("loginForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      showMsg("loginMsg","ok","Checking portal login...");
      const fd = new FormData(e.target);
      try {
        const res = await fetch(API + "/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            email: String(fd.get("email") || "").trim(),
            password: String(fd.get("password") || "")
          })
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok || !data.ok) throw new Error(data.message || "Portal login failed");
        showMsg("loginMsg","ok","Portal login API is working. Logged in as " + (data.user?.email || "user") + ".");
      } catch (err) {
        showMsg("loginMsg","err",err.message || "Portal login failed");
      }
    });

    document.getElementById("requestForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      showMsg("requestMsg","ok","Submitting request...");
      const fd = new FormData(e.target);
      try {
        const res = await fetch(API + "/request-access", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            organisationName: String(fd.get("organisationName") || "").trim(),
            contactName: String(fd.get("contactName") || "").trim(),
            email: String(fd.get("email") || "").trim(),
            phone: String(fd.get("phone") || "").trim(),
            serviceType: String(fd.get("serviceType") || "").trim(),
            siteAddress: String(fd.get("siteAddress") || "").trim(),
            postcode: String(fd.get("postcode") || "").trim(),
            description: String(fd.get("description") || "").trim()
          })
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok || !data.ok) throw new Error(data.message || "Request failed");
        showMsg("requestMsg","ok","Request submitted. Reference: " + (data.reference || "created"));
        e.target.reset();
      } catch (err) {
        showMsg("requestMsg","err",err.message || "Request failed");
      }
    });
  </script>
</body>
</html>
