<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Set Portal Password | Safety Check Test Ltd</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f8fafc;
      color: #0f172a;
    }
    .wrap {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      width: 100%;
      max-width: 560px;
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 24px;
      box-shadow: 0 16px 40px rgba(15,23,42,0.08);
      overflow: hidden;
    }
    .top {
      background: #0f172a;
      color: #fff;
      padding: 28px;
    }
    .top h1 {
      margin: 0 0 8px;
      font-size: 28px;
    }
    .top p {
      margin: 0;
      color: #cbd5e1;
    }
    .body {
      padding: 28px;
    }
    .field {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 18px;
    }
    label {
      font-weight: 700;
      font-size: 14px;
    }
    input {
      height: 48px;
      border-radius: 12px;
      border: 1px solid #cbd5e1;
      padding: 0 14px;
      font-size: 16px;
      outline: none;
      color: #0f172a;
      background: #fff;
      box-sizing: border-box;
      width: 100%;
    }
    button {
      width: 100%;
      height: 50px;
      border: none;
      border-radius: 12px;
      background: linear-gradient(135deg,#f59e0b,#fbbf24);
      color: #111827;
      font-weight: 800;
      font-size: 16px;
      cursor: pointer;
      box-shadow: 0 10px 25px rgba(245,158,11,0.22);
    }
    .msg {
      margin-top: 16px;
      border-radius: 12px;
      padding: 14px 16px;
      font-weight: 700;
      display: none;
    }
    .msg.ok {
      display: block;
      background: #ecfdf5;
      color: #065f46;
      border: 1px solid #a7f3d0;
    }
    .msg.err {
      display: block;
      background: #fef2f2;
      color: #991b1b;
      border: 1px solid #fecaca;
    }
    .links {
      margin-top: 18px;
      text-align: center;
    }
    .links a {
      color: #0f172a;
      font-weight: 700;
      text-decoration: none;
    }
    .small {
      margin-top: 10px;
      font-size: 13px;
      color: #64748b;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="top">
        <h1>Set Your Portal Password</h1>
        <p>Safety Check Test Ltd Client Portal</p>
      </div>
      <div class="body">
        <form id="setPasswordForm">
          <div class="field">
            <label for="password">New password</label>
            <input id="password" type="password" autocomplete="new-password" minlength="8" required>
          </div>

          <div class="field">
            <label for="confirmPassword">Confirm password</label>
            <input id="confirmPassword" type="password" autocomplete="new-password" minlength="8" required>
          </div>

          <button type="submit" id="submitBtn">Set Password</button>
        </form>

        <div id="message" class="msg"></div>

        <div class="links">
          <a href="/portal/">Go to Portal Login</a>
        </div>

        <div class="small">
          Your password link must be opened from the email you received.
        </div>
      </div>
    </div>
  </div>

  <script>
    const API_BASE = "https://api.safetychecktestltd.co.uk";
    const params = new URLSearchParams(window.location.search);
    const token = params.get("token") || "";

    const form = document.getElementById("setPasswordForm");
    const message = document.getElementById("message");
    const submitBtn = document.getElementById("submitBtn");

    function showMessage(type, text) {
      message.className = "msg " + type;
      message.textContent = text;
    }

    form.addEventListener("submit", async function (e) {
      e.preventDefault();

      const password = document.getElementById("password").value.trim();
      const confirmPassword = document.getElementById("confirmPassword").value.trim();

      if (!token) {
        showMessage("err", "Missing password setup token.");
        return;
      }

      if (password.length < 8) {
        showMessage("err", "Password must be at least 8 characters.");
        return;
      }

      if (password !== confirmPassword) {
        showMessage("err", "Passwords do not match.");
        return;
      }

      submitBtn.disabled = true;
      submitBtn.textContent = "Saving...";

      try {
        const res = await fetch(API_BASE + "/api/portal/set-password", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ token, password })
        });

        const data = await res.json();

        if (!res.ok || !data.ok) {
          throw new Error(data.message || "Failed to set password");
        }

        showMessage("ok", "Password set successfully. You can now log in to the portal.");
        form.reset();

        setTimeout(() => {
          window.location.href = "/portal/";
        }, 1800);
      } catch (err) {
        showMessage("err", err.message || "Failed to set password");
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = "Set Password";
      }
    });
  </script>
</body>
</html>
